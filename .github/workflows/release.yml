name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SIMULATION_MODE: "true"
      TRADING_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run coverage

      - name: Verify test count
        run: |
          TEST_OUTPUT=$(npm test 2>&1)
          PASS_COUNT=$(echo "$TEST_OUTPUT" | grep -oP '\d+ passed' | grep -oP '\d+')
          if [ "$PASS_COUNT" -lt 800 ]; then
            echo "Test count dropped below 800 (got $PASS_COUNT). Failing build."
            exit 1
          fi
          echo "Test count: $PASS_COUNT (minimum: 800)"

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  release:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SIMULATION_MODE: "true"
      TRADING_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release tarball
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          TARBALL="flash-terminal-${TAG_NAME}.tar.gz"
          tar -czf "$TARBALL" dist/ package.json README.md CHANGELOG.md coverage/
          sha256sum "$TARBALL" > "${TARBALL}.sha256"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.TAG_NAME }}
          generate_release_notes: true
          files: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
