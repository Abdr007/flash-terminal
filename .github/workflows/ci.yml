name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SIMULATION_MODE: "true"
      TRADING_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Environment info
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm run coverage

      - name: Verify test count
        run: |
          TEST_OUTPUT=$(npm test 2>&1)
          PASS_COUNT=$(echo "$TEST_OUTPUT" | grep -oP '\d+ passed' | grep -oP '\d+')
          if [ "$PASS_COUNT" -lt 800 ]; then
            echo "Test count dropped below 800 (got $PASS_COUNT). Failing build."
            exit 1
          fi
          echo "Test count: $PASS_COUNT (minimum: 800)"

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
