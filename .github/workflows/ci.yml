name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check test count hasn't decreased
        run: |
          TEST_OUTPUT=$(npm test 2>&1)
          PASS_COUNT=$(echo "$TEST_OUTPUT" | grep -oP '\d+ passed' | grep -oP '\d+')
          if [ "$PASS_COUNT" -lt 300 ]; then
            echo "Test count dropped below 300 (got $PASS_COUNT). Failing build."
            exit 1
          fi
          echo "Test count: $PASS_COUNT (minimum: 300)"
