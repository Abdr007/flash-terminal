version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      solana:
        patterns:
          - "@solana/*"
          - "flash-sdk"
          - "@coral-xyz/*"
          - "@pythnetwork/*"
      dev-tools:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "typescript"
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
          - "prettier"
          - "husky"
          - "lint-staged"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
